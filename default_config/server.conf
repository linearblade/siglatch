# siglatchd configuration
log_file = /tmp/siglatch.log
default_server = secure
output_mode = unicode
payload_overflow = reject

[server:secure]
enabled = yes
label = Secure Server
port = 50000
secure = yes
# Deprecated: decode failures now fall through to the raw dead-drop lane.
enforce_wire_decode = no
enforce_wire_auth = no
output_mode = unicode
payload_overflow = inherit
priv_key_path = /etc/siglatch/server_priv.pem
deaddrops = message
actions = grant_ip, revoke_ip, expire_ips, flush_ips, test_blurt, version
logging = yes

[server:insecure]
enabled = no
label = Insecure Server
port = 50001
deaddrops = pubkey
secure = no
# Deprecated: decode failures now fall through to the raw dead-drop lane.
enforce_wire_decode = no
enforce_wire_auth = no


[deaddrop:message]
constructor = /bin/sh path/to/script/here
require_ascii = yes
starts_with = message
exec_split = yes

[deaddrop:pubkey]
constructor = /directly/exec/script/dont/forget/shebang <#!>
enabled = no
starts_with = pubkey,key, public key
# Global action registry
[action:grant_ip]
id = 1
constructor = /usr/bin/perl /etc/siglatch/scripts/ipAuth/grant.pl
exec_split = 1
# App/job-layer policy only; daemon policy consumes this.
enforce_wire_auth = no
keepalive_interval = 300
[action:revoke_ip]
id = 2
constructor = /usr/bin/perl /etc/siglatch/scripts/ipAuth/revoke.pl
exec_split = 1
keepalive_interval = 300
[action:expire_ips]
id = 3
constructor = /usr/bin/perl /etc/siglatch/scripts/ipAuth/expire.pl
exec_split = 1
keepalive_interval = 300
[action:flush_ips]
id = 4
constructor = /usr/bin/perl /etc/siglatch/scripts/ipAuth/flush.pl
exec_split = 1
keepalive_interval = 300

[action:run_script]
enabled = no
constructor = /usr/local/bin/do_something.sh
destructor = /usr/local/bin/undo_something.sh
keepalive_interval = 600

[action:reload_config]
id = 50
enabled = no
handler = builtin
builtin = reload_config

[action:probe_rebind]
id = 56
enabled = no
handler = builtin
builtin = probe_rebind

[action:rebind_listener]
id = 57
enabled = no
handler = builtin
builtin = rebind_listener

[action:change_setting]
id = 51
enabled = no
handler = builtin
builtin = change_setting
# Payload example:
# server.enforce_wire_decode = yes  # deprecated; retained for compatibility only
# server.enforce_wire_auth = no

[action:save_config]
id = 52
enabled = no
handler = builtin
builtin = save_config

[action:load_config]
id = 53
enabled = no
handler = builtin
builtin = load_config

[action:list_users]
id = 54
enabled = no
handler = builtin
builtin = list_users

[action:test_blurt]
id = 55
enabled = yes
handler = builtin
builtin = test_blurt

[action:version]
id = 60
enabled = yes
handler = builtin
builtin = version

[action:sample_blurt_static]
id = 58
enabled = no
handler = static
object = sample_blurt_static

# Example dynamic action. Leave commented until object_path and symbol are real,
# because dynamic handlers are validated at config load time.
#
#[action:sample_blurt_dynamic]
#id = 59
#enabled = no
#handler = dynamic
#object = sample_blurt_dynamic_handle
#object_path = build/objects/libsample_blurt_dynamic.dylib

# User access
[user:root]
id = 1
enabled = yes
key_file = /etc/siglatch/keys/root.pub.pem
hmac_file = /etc/siglatch/keys/root.hmac.key
actions = grant_ip, revoke_ip, expire_ips, flush_ips, test_blurt
